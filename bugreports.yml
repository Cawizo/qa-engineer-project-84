---
- summary: |
    TC-002
    Некорректная кликабельная зона карточка товара
  environment: |
    Yandex Browser 26.4.5.634 (64-bit)
    OC Windows 11
  steps-to-reproduce: |
    1. Нажимаем на любое место карточки товара, кроме кнопки "В корзину"
  expected-result: |
    Подробная информация о товаре открывается при нажатии только на изображение товара
    Пользователь должен увидеть подробную информацию о товаре: название, рейтинг, цена без скидки и цена со скидкой
  actual-result: |
    Подробная информация о товаре открывается при нажатии на любую зону карточка товара
    Пользователь должен увидеть подробную информацию о товаре: название, рейтинг, цена без скидки и цена со скидкой
    
- summary: |
    TC-005
    Некорректная фильтрация по цене
  environment: |
    Yandex Browser 26.4.5.634 (64-bit)
    OC Windows 11
  steps-to-reproduce: |
    1. Зайти на страницу сайта https://products-store.hexlet.app/
    2. Ввести в фильтре по цене значение
  expected-result: |
    При использовании фильтра цены выводиться соответствующий список товаров по фактической цене товара, учитывая скидку
  actual-result: |
    При использовании фильтра цены выводиться соответствующий список товаров по фактической цене товара, не учитывая скидку
    Ошибка изображена на скриншоте assets/bug005.png

- summary: |
    TC-013
    Нет разделения кнопок на удалить позицию, удалить единицу товара
  environment: |
    Yandex Browser 26.4.5.634 (64-bit)
    OC Windows 11
  steps-to-reproduce: |
    1. Зайти на страницу сайта https://products-store.hexlet.app/
    2. Добавить товар в корзину
    3. Открыть корзину
    4. Напротив товара нажать кнопку "Удалить"
  expected-result: |
    Товар удаляется полностью
  actual-result: |
    Удаляется одна единица товара

- summary: |
    TC-016
    Не оформляетя заказ
  environment: |
    Yandex Browser 26.4.5.634 (64-bit)
    OC Windows 11
  steps-to-reproduce: |
    1. Зайти на страницу сайта https://products-store.hexlet.app/
    2. Добавить товар в корзину
    3. Открыть корзину
    4. Нажать кнопку "Оформить заказ"
  expected-result: |
    Открывается страница оплаты товара
    Выполняется запрос на сервер
  actual-result: |
    Открывается модальное окно "Заказ успешно оформлен"
    Ошибка 500 в DevTools
    Ошибка изображена на скриншоте assets/bug016.png

- summary: |
    TC-017
    Не работает часть функционала при продолжении покупок на сайте
  environment: |
    Yandex Browser 26.4.5.634 (64-bit)
    OC Windows 11
  steps-to-reproduce: |
    1. Зайти на страницу сайта https://products-store.hexlet.app/
    2. Добавить товар в корзину
    3. Открыть корзину
    4. Нажать кнопку "Оформить заказ"
    5. Нажать кнопку крестика
    6. Нажать кнопку "Продолжить покупки"
  expected-result: |
    Открывается каталог товаров
  actual-result: |
    Не работает кнопка крестика на 5 шаге
    Ошибка изображена на скриншоте assets/bug017.png

- summary: |
    TC-018
    Некорректно работает пагинация
  environment: |
    Yandex Browser 26.4.5.634 (64-bit)
    OC Windows 11
  steps-to-reproduce: |
    1. Зайти на страницу сайта https://products-store.hexlet.app/
    2. Нажать кнопку "Следующая"
    3. Нажать кнопку "Следующая"
    4. Нажать кнопку "Предыдущая"
  expected-result: |
    Состав фильтра не сбрасывается и не изменяется при смене страницы
  actual-result: |
    Сбрасывается фильтрации при смене страницы, не сохраняются выбранные фильтры
    В DevTools выолпняется запрос products?skip=30

- summary: |
    TC-019
    Не работает хештег товара
  environment: |
    Yandex Browser 26.4.5.634 (64-bit)
    OC Windows 11
  steps-to-reproduce: |
    1. Зайти на страницу сайта https://products-store.hexlet.app/
    2. Открыть карточку товара
    3. Нажать хештег
  expected-result: |
    Открывается страница каталога с выбранной категорией хештега
  actual-result: |
    При нажатии на хештег ничего не происходит
    В адрес сайта добавляется # - https://products-store.hexlet.app/products/2#

- summary: |
    TC-022
    Визуальная ошибка дропдаун смены языка
  environment: |
    Yandex Browser 26.4.5.634 (64-bit)
    OC Windows 11
  steps-to-reproduce: |
    1. Зайти на страницу сайта https://products-store.hexlet.app/
    2. Нажать на дропдаун Language/Язык/Idioma
  expected-result: |
    Корреткно отображается флаг и название языка
  actual-result: |
    У английского языка нет флага и дважды пишется слово English
    Ошибка изображена на скриншоте assets/bug022.png

- summary: |
    TC-023
    Некорректное отображение интерфейса на мобильных устройствах
  environment: |
    Yandex Browser 26.4.5.634 (64-bit)
    Телефон с шириной менее 441
  steps-to-reproduce: |
    1. Зайти на страницу сайта https://products-store.hexlet.app/
  expected-result: |
    Корреткно отображается мобильная версия сайта
  actual-result: |
    Мобильная версия сайта отсутствует как таковая
    Некорректное отображение интерфейса:
    - каталог товаров "уехал" вниз
    - в корзине не влазят название кнопок и информация о товаре
    - смена языка увеличивает шапку сайта
    Ошибка изображена на скриношотах assets/bug023-1.png, bug023-2.png, bug023-3.png, bug023-4.png

