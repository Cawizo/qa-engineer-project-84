---
- summary: |
    TC-005
    Некорректная фильтрация по цене
  environment: |
    Yandex Browser 26.4.5.634 (64-bit)
    OC Windows 11
  steps-to-reproduce: |
    1. Зайти на страницу сайта https://products-store.hexlet.app/
    2. Ввести в фильтре по цене значение
  expected-result: |
    При использовании фильтра цены выводиться соответствующий список товаров по фактической цене товара, учитывая скидку
  actual-result: |
    При использовании фильтра цены выводиться соответствующий список товаров по фактической цене товара, не учитывая скидку
    Ошибка изображена на скриншоте 

- summary: |
    Изменяется url в адресной строке браузера, не работают вкладки LOBBY/TOURNAMENT/COMPLETED GAMES
  environment: |
    Google Chrome	107.0.5304.121 (Официальная сборка) (64 бит)
    ОС Linux
  steps-to-reproduce: |
    1. Залогиниться в системе https://codebattle.hexlet.io/session/new?locale=en&next=%2F
    2. Переключить Лидерборд по сроку (месяц/неделя/за все время)
    3. Переключить LOBBY/TOURNAMENT/COMPLETED GAMES
  expected-result: |
    url в адресной строке не меняется
    Вкладки работают
  actual-result: |
    При нажатии на week,month,all в urlHash появляется '!'
    Вкладки не работают.
    Ошибка изображена на скриншоте assets/bug.png
