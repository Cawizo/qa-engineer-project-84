---
test-cases:
    - summary: |
        TC-001
        При открытии страницы магазина пользователь должен видеть каталог товаровм
      status: pass
    
    - summary: |
        TC-002
        При нажатии на карточку товара должна открываться подробная информация о товаре
      status: pass
    
    - summary: |
        TC-003
        При использовании фильтра ключевого слова должен выводиться соответствующий список товаров
      status: pass
    
    - summary: |
        TC-004
        При использовании фильтра категории должен выводиться соответствующий список товаров
      status: pass
    
    - summary: |
        TC-005
        При использовании фильтра цены должен выводиться соответствующий список товаров по фактической цене товара
      status: fail
    
    - summary: |
        TC-006
        При использовании фильтра по наличию должен выводиться соответствующий список товаров
      status: fail
    
    - summary: |
        TC-007
        При использовании фильтра несущствующего ключевого слова должно отображаться сообщение об отсутствии результатов
      status: fail
    
    - summary: |
        TC-008
        При нажатии на кнопку "В корзину" товар должен появиться в корзине
      status: pass
    
    - summary: |
        TC-009
        При повторном нажатии на кнопку "В корзину" товар должен появиться в корзине за каждое нажатие
      status: pass
    
    - summary: |
        TC-010
        Добавление другого товара в корзину
      status: pass
    
    - summary: |
        TC-011
        При нажатии на кнопку "Корзина" пользователю должна открыться корзина со всеми добавленными товарами
      status: pass
    
    - summary: |
        TC-012
        При наличии одной единице товара и нажатии кнопки "Удалить" товар должен исчезнуть из корзины
      status: pass
    
    - summary: |
        TC-013
        При наличии несколько единиц товара и нажатии кнопки "Удалить" товар должен исчезнуть из корзины
      status: fail
    
    - summary: |
        TC-014
        При нажатии на кнопку "Очистить корзину" товар должен исчезнуть из корзины
      status: pass
    
    - summary: |
        TC-015
        Должна быть возможность продолжить покупки в магазине из корзины
      status: pass
    
    - summary: |
        TC-016
        При нажатии на кнопку "Оформить заказ" пользователь должен заказать товар
      status: fail
    
    - summary: |
        TC-017
        Пользователь должен иметь возможность после оформления заказа продолжить покупки на сайте
      status: fail
    
    - summary: |
        TC-018
        Каталог должен поддерживать постраничный вывод (пагинацию) с сохранением применённых фильтров при переходе между страницами
      status: fail
    
    - summary: |
        TC-019
        Страница товара позволяет перейти ко всем товарам категории выбранного товара
      status: pass
    
    - summary: |
        TC-020
        Сайт магазина позволяет изменить язык интерфейса на Русский
      status: pass
    
    - summary: |
        TC-021
        Сайт магазина позволяет изменить язык интерфейса на Испанский
      status: pass
    
    - summary: |
        TC-022
        Визуал дропдаун изменения языка
      status: fail
    
    - summary: |
        TC-023
        При открытии страницы магазина с телефона пользователю должна быть доступна мобильная версия сайта
      status: fail

bugreports:
    - summary: |
        TC-005
        Некорректная фильтрация по цене
      environment: |
        Yandex Browser 26.4.5.634 (64-bit)
        OC Windows 11
      steps-to-reproduce: |
        1. Зайти на страницу сайта https://products-store.hexlet.app/
        2. Ввести в фильтре по цене значение
      expected-result: |
        При использовании фильтра цены выводиться соответствующий список товаров по фактической цене товара, учитывая скидку
      actual-result: |
        При использовании фильтра цены выводиться соответствующий список товаров по фактической цене товара, не учитывая скидку
        Ошибка изображена на скриншоте assets/r-bug005.png
    
    - summary: |
        TC-006
        Не работает поиск товара по наличию
      environment: |
        Yandex Browser 26.4.5.634 (64-bit)
        OC Windows 11
      steps-to-reproduce: |
        1. Зайти на страницу сайта https://products-store.hexlet.app/
        2. Снять галочку с "В наличии"
      expected-result: |
        Пользователь должен увидеть список товаров НЕ в наличии
      actual-result: |
        Ничего не происходит, пропадает кнопка "Следующая"
        Ошибка изображена на скриншоте assets/r-bug006.png
    
    - summary: |
        TC-007
        Поиск без результата
      environment: |
        Yandex Browser 26.4.5.634 (64-bit)
        OC Windows 11
      steps-to-reproduce: |
        1. Зайти на страницу сайта https://products-store.hexlet.app/
        2. Ввести заведовомо несуществующее ключевое слово
      expected-result: |
        Пользователь должен увидеть список товаров НЕ в наличии
      actual-result: |
        Ничего не происходит, пропадает кнопка "Следующая"
        Ошибка изображена на скриншоте assets/r-bug007.png
    
    - summary: |
        TC-013
        Нет разделения кнопок на удалить позицию, удалить единицу товара
      environment: |
        Yandex Browser 26.4.5.634 (64-bit)
        OC Windows 11
      steps-to-reproduce: |
        1. Зайти на страницу сайта https://products-store.hexlet.app/
        2. Добавить товар в корзину
        3. Открыть корзину
        4. Напротив товара нажать кнопку "Удалить"
      expected-result: |
        Товар удаляется полностью
      actual-result: |
        Удаляется одна единица товара
    
    - summary: |
        TC-016
        Не оформляетя заказ
      environment: |
        Yandex Browser 26.4.5.634 (64-bit)
        OC Windows 11
      steps-to-reproduce: |
        1. Зайти на страницу сайта https://products-store.hexlet.app/
        2. Добавить товар в корзину
        3. Открыть корзину
        4. Нажать кнопку "Оформить заказ"
      expected-result: |
        Открывается страница оплаты товара
        Выполняется запрос на сервер
      actual-result: |
        Открывается модальное окно "Заказ успешно оформлен"
        Ошибка 500 в DevTools
        Ошибка изображена на скриншоте assets/r-bug016.png
    
    - summary: |
        TC-017
        Не работает часть функционала при продолжении покупок на сайте
      environment: |
        Yandex Browser 26.4.5.634 (64-bit)
        OC Windows 11
      steps-to-reproduce: |
        1. Зайти на страницу сайта https://products-store.hexlet.app/
        2. Добавить товар в корзину
        3. Открыть корзину
        4. Нажать кнопку "Оформить заказ"
        5. Нажать кнопку крестика
        6. Нажать кнопку "Продолжить покупки"
      expected-result: |
        Открывается каталог товаров
      actual-result: |
        Не работает кнопка крестика на 5 шаге
        Ошибка изображена на скриншоте assets/r-bug017.png
    
    - summary: |
        TC-018
        Некорректно работает пагинация
      environment: |
        Yandex Browser 26.4.5.634 (64-bit)
        OC Windows 11
      steps-to-reproduce: |
        1. Зайти на страницу сайта https://products-store.hexlet.app/
        2. Нажать кнопку "Следующая"
        3. Нажать кнопку "Следующая"
        4. Нажать кнопку "Предыдущая"
      expected-result: |
        Состав фильтра не сбрасывается и не изменяется при смене страницы
      actual-result: |
        Сбрасывается фильтрации при смене страницы, не сохраняются выбранные фильтры
        В DevTools выолпняется запрос products?skip=30
    
    - summary: |
        TC-022
        Визуальная ошибка дропдаун смены языка
      environment: |
        Yandex Browser 26.4.5.634 (64-bit)
        OC Windows 11
      steps-to-reproduce: |
        1. Зайти на страницу сайта https://products-store.hexlet.app/
        2. Нажать на дропдаун Language/Язык/Idioma
      expected-result: |
        Корреткно отображается флаг и название языка
      actual-result: |
        У всех языков нет флага
        Ошибка изображена на скриншоте assets/r-bug022.png
    
    - summary: |
        TC-023
        Некорректное отображение интерфейса на мобильных устройствах
      environment: |
        Yandex Browser 26.4.5.634 (64-bit)
        Телефон с шириной менее 441
      steps-to-reproduce: |
        1. Зайти на страницу сайта https://products-store.hexlet.app/
      expected-result: |
        Корреткно отображается мобильная версия сайта
      actual-result: |
        Мобильная версия сайта отсутствует как таковая
        Некорректное отображение интерфейса: фильтрация каталога товаров, корзина, смена языка
        Ошибка изображена на скриношотах assets/r-bug023-1.png, r-bug023-2.png, r-bug023-3.png
    
