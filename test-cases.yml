---
- id: TC-001
  summary: |
    Каталог товаров
  requirement: |
    При открытии страницы магазина пользователь должен видеть каталог товаров
  prerequisites: N/A
  test-data: N/A
  steps:
    - Открываем страницу магазина https://products-store.hexlet.app/
  expected-result: |
    Пользователь должен увидеть каталог товаров с информацией о каждом товаре: название, рейтинг, цена без скидки и цена со скидкой

