---
- summary: |
    Краткое описание тест кейса. Пример: Проверка входа пользователя с существующими логином и паролем
  requirement: |
    Тестируемое требование. Например: При верном вводе логине и пароля пользователь должен войти в систему
  prerequisites: |
    Это условия, которые необходимы для проведения тест кейса. Они должны быть выполнены еще до запуска тест кейса.
    Например: открыта страница логина
  test-data: |
    Тестовые данные
    Логин = ilona Пароль = password
  steps:
    - Вводим логин
    - Вводим пароль
    - Нажимаем кнопку "Войти"
  expected-result: |
    Пользователь должен попасть на главную страницу

- summary: |
    Проверка поиска товара по ключевому слову
  requirement: |
    При использовании ключевого слова должен выводиться соответствующий список товаров
  prerequisites:
    Открыта страница магазина
  test-data: |
    essence
  steps:
    - Вводим в поиск ключевое слово
  expected-result: |
    Пользователь должен увидеть список товаров по ключевому слову

- summary: |
    Проверка поиска товара по категории
  requirement: |
    При использовании категории должен выводиться соответствующий список товаров
  prerequisites:
    Открыта страница магазина
  test-data: |
    beauty
  steps:
    - Выбираем в дропдауне категорию
  expected-result: |
    Пользователь должен увидеть список товаров по категории

- summary: |
    Просмотр подробной информации о товаре
  requirement: |
    При нажатии на товар должна появиться подробная информация о товаре
  prerequisites:
    Открыта страница магазина
  test-data: |
  steps:
    - Нажимаем на товар
  expected-result: |
    Пользователь должен увидеть подробную информацию о товаре

- summary: |
    Добавление товара в корзину
  requirement: |
    При нажатии на кнопку "В корзину" товар должен появиться в корзине
  prerequisites:
    Открыта страница магазина
  test-data: |
  steps:
    - Нажимаем кнопку "В корзину"
  expected-result: |
    Пользователь должен увидеть число над возле кнопки "Корзина"

- summary: |
    Просмотр содержимого корзины
  requirement: |
    При нажатии на кнопку "Корзина" пользователю должна открыться корзина со всеми добавленными товарами
  prerequisites:
    Открыта страница магазина
    Добавлен товар в корзину
  test-data: |
  steps:
    - Нажимаем кнопку "Корзина"
  expected-result: |
    Пользователь должен увидеть добавленный товар в корзину
