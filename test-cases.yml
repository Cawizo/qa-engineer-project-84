  prerequisites: Открыта страница магазина
  test-data: N/A
  steps:
    - Нажимаем на любое место карточки товара, кроме кнопки "В корзину"
  expected-result: |
    Пользователь должен увидеть подробную информацию о товаре: название, рейтинг, цена без скидки и цена со скидкой
  
