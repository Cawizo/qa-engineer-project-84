- id: TC-018
  summary: |
    Сохранение фильтрации при навигации по страницам каталога
  requirement: |
    Каталог должен поддерживать постраничный вывод (пагинацию) с сохранением списка фильтров при переходе между страницами
  prerequisites: |
    Открыт каталог.
    Количество товаров превышает размер одной страницы.
  test-data: N/A
  steps:
    - Перейти на страницу 2
    - Перейти на страницу 3
    - Вернуться на страницу 1
  expected-result: |
    Состав фильтра не сбрасывается и не изменяется при смене страницы.

